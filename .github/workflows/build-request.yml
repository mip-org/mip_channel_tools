name: Build request

# Issue-driven build trigger.
#
# Submitters open an issue listing one or more (package_path, architecture)
# pairs already present in this channel. On admin approval, the workflow
# dispatches `build-package.yml` once per pair. Nothing in the repo is
# modified — there is no clone, copy, commit, or push.
#
# Issue format (free-form, line-based):
#   - title starts with `build` (case-insensitive)
#   - body has one or more lines, each containing:
#       * a path `packages/<name>/<version>` (bare or inside a URL),
#         or the keyword `all-packages` to mean "every package in the
#         channel"
#       * one or more architecture keywords from
#         {any, linux_x86_64, macos_arm64, windows_x86_64, numbl_wasm, all}
#         (`all` expands to every arch declared in the package's mip.yaml,
#          intersected with the channel-supported arches above)
#       * optionally `force` to rebuild even if the .mhl is already
#         published with a matching source hash. Applies to that line only.
#
# Approval: a comment containing `approve` on its own line, from a
# user with write+ on the repo (OWNER/MEMBER/COLLABORATOR).

on:
  workflow_call:

jobs:
  initial-response:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Verify issue title
        id: check
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          title_lower=$(printf '%s' "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')
          if printf '%s' "$title_lower" | grep -qE '^build($|[^a-z])'; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Title does not start with 'build' — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.check.outputs.proceed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Checkout channel tooling
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: mip_channel_tools
      - name: Install channel tooling
        if: steps.check.outputs.proceed == 'true'
        run: python -m pip install "$GITHUB_WORKSPACE/mip_channel_tools"

      - name: Build validation comment
        if: steps.check.outputs.proceed == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .ci-tmp
          python3 -m mip_channel_tools build-request validate \
            --output-file .ci-tmp/comment.md \
            --title-file .ci-tmp/title.txt \
            --repo-root .

      - name: Post validation comment
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
            --body-file .ci-tmp/comment.md

      - name: Rewrite title to canonical form
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CURRENT_TITLE: ${{ github.event.issue.title }}
        run: |
          if [ ! -s .ci-tmp/title.txt ]; then
            echo "No canonical title — leaving title alone."
            exit 0
          fi
          new_title=$(head -n1 .ci-tmp/title.txt)
          if [ "$CURRENT_TITLE" = "$new_title" ]; then
            echo "Title already canonical."
            exit 0
          fi
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
            --title "$new_title"

  dispatch-on-approval:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write
      contents: read
    steps:
      - name: Verify trigger conditions
        id: check
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Title gate: only act on issues that look like build requests.
          title_lower=$(printf '%s' "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]')
          if ! printf '%s' "$title_lower" | grep -qE '^build($|[^a-z])'; then
            echo "Title does not start with 'build' — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! printf '%s\n' "$COMMENT_BODY" | tr -d '\r' \
              | grep -iqE '^[[:space:]]*approve[[:space:]]*$'; then
            echo "Comment does not contain 'approve' on its own line — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.check.outputs.proceed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Checkout channel tooling
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: mip_channel_tools
      - name: Install channel tooling
        if: steps.check.outputs.proceed == 'true'
        run: python -m pip install "$GITHUB_WORKSPACE/mip_channel_tools"

      - name: Resolve build request
        if: steps.check.outputs.proceed == 'true'
        id: resolve
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .ci-tmp
          if ! python3 -m mip_channel_tools build-request apply \
              --dispatch-file .ci-tmp/dispatch.tsv \
              --errors-file .ci-tmp/errors.md \
              --repo-root .; then
            echo "Apply step failed (parse/validation errors)."
            echo "resolved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -s .ci-tmp/dispatch.tsv ]; then
            n=$(wc -l < .ci-tmp/dispatch.tsv)
            echo "n_dispatches=$n" >> "$GITHUB_OUTPUT"
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          else
            echo "resolved=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch build-package workflows
        if: steps.check.outputs.proceed == 'true' && steps.resolve.outputs.resolved == 'true'
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          failed=0
          : > .ci-tmp/dispatched.md
          while IFS=$'\t' read -r pkg_path arch force; do
            [ -z "$pkg_path" ] && continue
            suffix=""
            [ "$force" = "true" ] && suffix=", force"
            echo "Dispatching: $pkg_path ($arch$suffix)"
            if gh workflow run build-package.yml --repo "$REPO" \
                -f package_path="$pkg_path" \
                -f architecture="$arch" \
                -f force="$force"; then
              printf -- '- `%s` (`%s`%s)\n' "$pkg_path" "$arch" "$suffix" >> .ci-tmp/dispatched.md
            else
              printf -- '- `%s` (`%s`%s) — FAILED to dispatch\n' "$pkg_path" "$arch" "$suffix" >> .ci-tmp/dispatched.md
              failed=1
            fi
          done < .ci-tmp/dispatch.tsv
          exit "$failed"

      - name: Report back to issue
        if: always() && steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESOLVED: ${{ steps.resolve.outputs.resolved }}
          N_DISPATCHES: ${{ steps.resolve.outputs.n_dispatches }}
          DISPATCH_RESULT: ${{ steps.dispatch.outcome }}
        run: |
          if [ "$RESOLVED" = "true" ] && [ "$DISPATCH_RESULT" = "success" ]; then
            dispatched_list=""
            if [ -f .ci-tmp/dispatched.md ]; then
              dispatched_list=$(cat .ci-tmp/dispatched.md)
            fi
            body="Dispatched ${N_DISPATCHES} build(s):"$'\n\n'"$dispatched_list"$'\n\n'"See the [Actions tab](https://github.com/${REPO}/actions/workflows/build-package.yml)."
          elif [ "$RESOLVED" != "true" ]; then
            errors=""
            if [ -f .ci-tmp/errors.md ]; then
              errors=$(cat .ci-tmp/errors.md)
            fi
            body=$'Cannot dispatch — issue did not parse:\n\n'"$errors"
          else
            partial=""
            if [ -f .ci-tmp/dispatched.md ]; then
              partial=$(cat .ci-tmp/dispatched.md)
            fi
            body=$'Some dispatches failed:\n\n'"$partial"$'\n\nSee the workflow run for details.'
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$body"

      - name: Close issue after successful dispatch
        if: >-
          steps.check.outputs.proceed == 'true' &&
          steps.resolve.outputs.resolved == 'true' &&
          steps.dispatch.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue close "$ISSUE_NUMBER" --repo "$REPO" --reason completed
