name: Build Package
run-name: "${{ inputs.package_path }} (${{ inputs.architecture }})${{ inputs.force && ' [force]' || '' }}${{ !inputs.publish && ' [test]' || '' }}${{ inputs.source_repo != '' && format(' [{0}]', inputs.source_repo) || '' }}"

# Per-package, per-architecture build pipeline.
#
# A single run handles ONE (package_path, architecture) pair, with three jobs:
#   1. build              - prepare + bundle the package -> .mhl artifact
#   2. test-and-upload    - install/load/test the .mhl on its native arch,
#                            then upload to GitHub Releases on success
#   3. assemble-and-deploy - rebuild the channel index from all releases
#                            and deploy to GitHub Pages
#
# Reusable workflow: a channel's thin `build-package.yml` caller (which owns
# the workflow_dispatch trigger and inputs) invokes this with `secrets: inherit`.
# One run handles ONE (package_path, architecture) pair.

on:
  workflow_call:
    inputs:
      package_path:
        description: 'Release dir, e.g. packages/with_test/1.0.0'
        required: true
        type: string
      architecture:
        description: 'Target architecture'
        required: true
        type: string
      force:
        description: 'Rebuild even if already published'
        required: false
        type: boolean
        default: false
      source_repo:
        # When set, the package source (packages/<name>/<release>/) is taken
        # from THIS repo instead of the calling channel — used by the
        # cross-channel submission flow to test a foreign package without
        # copying it in. Empty means "this channel's own tree" (the default).
        description: 'Foreign repo to take packages/ from, e.g. owner/mip-staging'
        required: false
        type: string
        default: ''
      publish:
        # true  (default): publish into the channel — upload the .mhl to the
        #   package's real GitHub Release and rebuild/deploy the channel index.
        # false (test build): the .mhl is built and tested, then uploaded to the
        #   rolling `_test-builds` prerelease instead of the package's release,
        #   and the index assemble/deploy job is skipped. This gives the .mhl a
        #   direct download URL for local testing without entering the channel
        #   index. Used for submission test builds.
        description: 'Publish the built .mhl into the channel (real release + reindex)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  setup:
    name: setup (${{ inputs.architecture }})
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.pick.outputs.runner }}
    steps:
      - name: Pick runner for architecture
        id: pick
        shell: bash
        run: |
          case "${{ inputs.architecture }}" in
            any)            runner=ubuntu-latest ;;
            linux_x86_64)   runner=ubuntu-latest ;;
            macos_arm64)    runner=macos-14 ;;
            # Pin VS2022, not windows-latest: that image moved to Visual Studio
            # 2026 (v18), which MATLAB does not support as a MEX compiler ("No
            # Microsoft Visual C++ compiler found"). R2023a detects VS2022 here.
            windows_x86_64) runner=windows-2022 ;;
            # numbl_wasm produces a portable .wasm (emcc) — no native MEX, no
            # glibc floor, so it builds on a plain ubuntu runner.
            numbl_wasm)     runner=ubuntu-latest ;;
            *)
              echo "Unknown architecture: ${{ inputs.architecture }}" >&2
              exit 1
              ;;
          esac
          echo "runner=$runner" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ inputs.architecture }})
    needs: setup
    runs-on: ${{ needs.setup.outputs.runner }}
    # linux_x86_64 builds inside an old-glibc (2.28) container so the MEX and any
    # bundled .so load on the RHEL/Rocky 8 fleet. ubi8 is the oldest glibc
    # MathWorks supports for MATLAB and matches the deployment target exactly; it
    # is also the lowest glibc the GitHub Actions runner's Node (20/24) runs on.
    # Other arches use no container (empty string). See devnotes/MATLAB-GLIBC.md.
    container: ${{ inputs.architecture == 'linux_x86_64' && 'mathworks/matlab-deps:r2022a-ubi8' || '' }}
    outputs:
      has_bundle: ${{ steps.bundle_check.outputs.has_bundle }}
      mhl_name: ${{ steps.bundle_check.outputs.mhl_name }}
    steps:
      # ubi8 ships no git; actions/checkout falls back to a slow API tarball
      # without it. Install it first (a run: step needs no Node, so it works
      # before checkout even in the container).
      - name: Install git for checkout (Linux container)
        if: inputs.architecture == 'linux_x86_64'
        shell: bash
        run: dnf install -y git

      - name: Checkout repository
        # The package source (packages/<name>/<release>/) comes from the
        # calling channel by default, or from `source_repo` for a
        # cross-channel submission test build.
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.source_repo != '' && inputs.source_repo || github.repository }}

      - name: Checkout mip
        uses: actions/checkout@v5
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          root="$HOME/.mip"
          mkdir -p "$root/packages"
          # MATLAB is a native Windows program; hand it a Windows path, not
          # the MSYS/Git-bash '/c/...' form. cygpath is a no-op on linux/macOS.
          if command -v cygpath >/dev/null 2>&1; then root="$(cygpath -w "$root")"; fi
          echo "MIP_ROOT=$root" >> "$GITHUB_ENV"

      - name: Linux toolchain (gcc-toolset-10 from Rocky AppStream; glibc 2.28)
        if: inputs.architecture == 'linux_x86_64'
        shell: bash
        run: |
          # We build in the ubi8 container to pin the glibc floor to 2.28 (the
          # Rocky/RHEL 8 fleet). For the compiler we use gcc-toolset-10 (GCC 10.3)
          # rather than ubi8's stock GCC 8.5. RHEL's gcc-toolset dynamic-links the
          # base-system libstdc++ (GLIBCXX_3.4.25) and statically supplies newer
          # C++17/20 symbols via libstdc++_nonshared.a, so a gcc-10 MEX keeps the
          # same GLIBCXX_3.4.25 floor as gcc-8.5 (within R2022a's bundled libstdc++)
          # with a newer compiler and no floor regression. Verified on ubi8: a C++17
          # std::filesystem .so links yet still requires only GLIBCXX_3.4.21, and
          # glibc stays 2.28. See https://github.com/mip-org/devnotes/blob/main/MATLAB-GCC.md.
          #
          # gcc-toolset-10 lives in Rocky's AppStream (not ubi8's subset), so add the
          # Rocky repos first. Rocky 8 is a 1:1 RHEL 8 rebuild with open repos (same
          # glibc 2.28); only RHEL8-compatible leaf packages get pulled (verified: no
          # glibc/base replacement). These repos also supply boost-devel/CGAL, which
          # the ubi AppStream subset lacks.
          rpm --import https://download.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-8
          ROCKY_KEY=https://download.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-8
          ROCKY_BASE=https://download.rockylinux.org/pub/rocky/8
          : > /etc/yum.repos.d/rocky.repo
          for r in BaseOS AppStream PowerTools; do
            lc=$(echo "$r" | tr 'A-Z' 'a-z')
            printf '%s\n' "[rocky-$lc]" "name=Rocky8 $r" \
              "baseurl=$ROCKY_BASE/$r/x86_64/os/" "enabled=1" "gpgcheck=1" \
              "gpgkey=$ROCKY_KEY" "" >> /etc/yum.repos.d/rocky.repo
          done
          # Compilers from gcc-toolset-10 (gcc/g++/gfortran + the toolset's binutils,
          # which provides the objdump the glibc gate uses -- and keeps gcc-10 paired
          # with its own as/ld 2.35, not the system 2.30). Other prereqs: unzip lets
          # the gate read the shipped .mhl (a zip); patchelf (EPEL) rpaths bundled .so
          # deps; libatomic is required by MATLAB's mpm installer (setup-matlab) and
          # isn't in the matlab-deps image; python39 backs the `python` the build
          # steps invoke. We run as root in the container, so no sudo.
          dnf install -y gcc-toolset-10-gcc gcc-toolset-10-gcc-c++ \
                         gcc-toolset-10-gcc-gfortran gcc-toolset-10-binutils \
                         make unzip python39 python39-pip libatomic
          dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm
          dnf install -y patchelf
          # gcc-toolset is a Software Collection under /opt/rh, off the default PATH.
          # Putting it on PATH via $GITHUB_ENV reaches `run:` steps but NOT MATLAB's
          # mex compiler detection: mex runs `which gcc` in an environment that
          # searches only the baseline PATH (/usr/bin etc.), so a gcc under /opt/rh
          # goes undetected and `mex -setup` fails ("compiler is not detected").
          # Stock GCC 8.5 worked only because it lived at /usr/bin/gcc. So symlink the
          # toolset bin into /usr/bin, where mex provably looks. This also pins the
          # assembler/linker: gcc-toolset-10-gcc pulls in the base binutils 2.30 (->
          # /usr/bin/as,ld) as a dependency, and gcc-10 resolves as/ld by bare name
          # via PATH -- so without these symlinks it would assemble/link with 2.30
          # rather than the toolset's 2.35. The symlinks touch only PATH-based tool
          # resolution, never LD_LIBRARY_PATH, so the strip-test environment is
          # unaffected. (gcc canonicalizes the symlink to find its own cc1/libexec.)
          ln -sf /opt/rh/gcc-toolset-10/root/usr/bin/* /usr/bin/
          # The build steps invoke `python`, but RHEL 8 ships only python3.x, and
          # setup-python's prebuilt CPython needs glibc >= 2.34 (won't run here).
          # Point `python` at the container's native (glibc-2.28) python3.9.
          ln -sf /usr/bin/python3.9 /usr/bin/python
          gcc --version
          as --version | head -1
          python --version

      - name: macOS gfortran alias
        if: inputs.architecture == 'macos_arm64'
        run: |
          gfortran-15 --version
          ln -sf /opt/homebrew/bin/gfortran-15 /opt/homebrew/bin/gfortran
          gfortran --version

      - name: Windows toolchain (MathWorks-certified MinGW-w64 8.1.0)
        if: inputs.architecture == 'windows_x86_64'
        shell: pwsh
        run: |
          # The runner ships only a modern GCC (15.x). MATLAB's mingw64.xml
          # accepts it but flags it "unsupported", and it's why the Windows
          # build was pinned to R2023b (older MATLAB mex configs reject modern
          # GCC outright). Install the MinGW that R2023b actually certifies —
          # 8.1.0, posix threads + SEH exceptions, rt_v6, the exact variant the
          # MathWorks support package uses — so mex builds the C gateway against
          # a supported compiler and the warning goes away. We just drop the
          # toolchain on disk and export MW_MINGW64_LOC (the documented hook
          # mingw64.xml reads); no support-package install or XML editing. The
          # install path has no spaces, per the MathWorks requirement.
          # See https://github.com/mip-org/devnotes/blob/main/MATLAB-MINGW.md.
          $url = 'https://downloads.sourceforge.net/project/mingw-w64/Toolchains%20targetting%20Win64/Personal%20Builds/mingw-builds/8.1.0/threads-posix/seh/x86_64-8.1.0-release-posix-seh-rt_v6-rev0.7z'
          $arc = "$env:RUNNER_TEMP\mingw810.7z"
          curl.exe -L --retry 5 --retry-all-errors --fail -o "$arc" "$url"
          # The archive's top-level folder is "mingw64": extracting under
          # C:\mingw810 yields C:\mingw810\mingw64.
          7z x "$arc" "-oC:\mingw810" -y > $null
          $root = "C:\mingw810\mingw64"
          if (-not (Test-Path "$root\bin\gfortran.exe")) {
            Write-Error "MinGW 8.1.0 extract failed: $root\bin\gfortran.exe missing"
            exit 1
          }
          & "$root\bin\gcc.exe" --version
          & "$root\bin\gfortran.exe" --version
          # Export for the Bundle step's MATLAB process. GITHUB_PATH prepends,
          # so 8.1.0 shadows the runner's C:\mingw64 for direct gfortran/
          # mingw32-make calls too.
          "MW_MINGW64_LOC=$root" >> $env:GITHUB_ENV
          "$root\bin" >> $env:GITHUB_PATH

      - name: Set up Emscripten (numbl_wasm)
        # numbl_wasm compile scripts shell out to emcc/em++ to produce a
        # standalone .wasm. setup-emsdk puts emcc on PATH (via GITHUB_PATH) so
        # the MATLAB-spawned `system(...)` calls in the compile script find it.
        if: inputs.architecture == 'numbl_wasm'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: Set up Python
        # Skipped in the ubi8 container: setup-python's prebuilt CPython is built
        # against a newer glibc (needs >= 2.34) and won't run on 2.28. The Linux
        # toolchain step installs the container's native python3 instead.
        if: inputs.architecture != 'linux_x86_64'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # This reusable workflow lives in mip_channel_tools; check out its own
      # repo (at the same ref it was called at) to get the build scripts,
      # mexopts, and vcpkg triplets alongside the Python package, then install
      # the package. The channel checkout (packages/, site/) is the default
      # `actions/checkout` above; this is a second checkout into a subdir.
      - name: Checkout channel tooling
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: mip_channel_tools
      - name: Install channel tooling
        shell: bash
        # `python -m pip`, not bare `pip`: setup-python's pip wrapper bakes the
        # host tool-cache path into its shebang, so bare `pip` fails with "bad
        # interpreter" in the ubi8 build container (where `python` is the
        # toolchain python3.9).
        run: |
          echo "MIP_TOOLS_DIR=$GITHUB_WORKSPACE/mip_channel_tools" >> "$GITHUB_ENV"
          python -m pip install "$GITHUB_WORKSPACE/mip_channel_tools"

      - name: Prepare package
        env:
          BUILD_ARCHITECTURE: ${{ inputs.architecture }}
        shell: bash
        run: |
          python -m mip_channel_tools prepare \
            --package-path "${{ inputs.package_path }}" \
            --architecture "${{ inputs.architecture }}" \
            ${{ inputs.force && '--force' || '' }}

      - name: Check for prepared package
        id: prepared_check
        shell: bash
        run: |
          if [ -d build/prepared ] && [ -n "$(ls -A build/prepared 2>/dev/null)" ]; then
            echo "has_prepared=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_prepared=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to bundle (arch mismatch or already published)."
          fi

      - name: Prepare vcpkg environment (Windows)
        if: inputs.architecture == 'windows_x86_64' && steps.prepared_check.outputs.has_prepared == 'true'
        shell: bash
        env:
          MIP_CACHE_TOKEN: ${{ secrets.MIP_CACHE_TOKEN }}
        run: |
          # Binary cache: a NuGet feed on GitHub Packages, shared by all
          # channels in this repo's owner namespace. vcpkg stores each port as
          # its own NuGet package keyed by ABI hash and restores/pushes per
          # port DURING the install, so:
          #   - concurrent builds never race: the previous actions/cache design
          #     tarred the whole archives dir under one write-once key, so the
          #     first job to finish (always a cheap package) froze the cache and
          #     gptoolbox's gmp/mpfr never persisted -- every Windows gptoolbox
          #     build cold-built them (~15 min);
          #   - entries never expire: actions/cache evicts after 7 idle days,
          #     guaranteeing cold builds for packages built less than weekly.
          # The feed follows the repo owner, so a channel hosted under another
          # owner caches in THAT owner's namespace with its own token -- cache
          # topology and trust follow repo ownership. Within mip-org, every
          # channel authenticates with the same machine-account PAT (org
          # secret MIP_CACHE_TOKEN, classic, write:packages), so package
          # ownership never fragments across repos: GitHub Packages grants
          # write per package to its publisher, and the publisher is always
          # this one identity. Channels outside mip-org supply their own PAT
          # as a repo secret of the same name. The token alone identifies the
          # caller; the nuget username field is nominal. Without the secret
          # (e.g. a fork), skip: vcpkg builds deps from source, uncached.
          if [ -n "$MIP_CACHE_TOKEN" ]; then
            feed="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
            nuget="$(cygpath -u "$(vcpkg fetch nuget | tail -1)")"
            "$nuget" sources add -Source "$feed" -Name GitHubPackages \
              -UserName "${{ github.repository_owner }}" -Password "$MIP_CACHE_TOKEN" \
              -StorePasswordInClearText
            "$nuget" setapikey "$MIP_CACHE_TOKEN" -Source "$feed"
            echo "VCPKG_BINARY_SOURCES=clear;nuget,GitHubPackages,readwrite" >> "$GITHUB_ENV"
            # Linkage metadata: GitHub associates a first-published package with
            # this repo (display + inherits the repo's public visibility).
            echo "VCPKG_NUGET_REPOSITORY=${{ github.server_url }}/${{ github.repository }}" >> "$GITHUB_ENV"
          else
            echo "::warning::MIP_CACHE_TOKEN not set; vcpkg binary caching disabled, native deps build from source"
          fi

          # Channel-shared overlay triplets, applied to every `vcpkg install` a
          # package runs (env var = the --overlay-triplets flag, globally). The
          # files in vcpkg-triplets/ shadow vcpkg's builtin triplets of the SAME
          # name (x64-windows-static-md, x64-windows) and add VCPKG_BUILD_TYPE
          # release, so vcpkg skips the unused debug half of each port (~halves a
          # cold build). Harmless to any port: an overlay triplet only applies
          # when its filename matches the requested triplet name, so a package
          # asking for some other triplet silently gets the builtin. Channel-level
          # (not per-package) keeps ABI hashes identical so every package -- and
          # every channel -- shares the binary cache above: the triplet's bytes
          # feed each port's ABI hash. The triplets now live in the shared
          # mip_channel_tools repo (cloned into mip_channel_tools/), so every
          # channel uses byte-identical triplets from one source.
          echo "VCPKG_OVERLAY_TRIPLETS=$(cygpath -w "$GITHUB_WORKSPACE/mip_channel_tools/vcpkg-triplets")" >> "$GITHUB_ENV"

      - name: Run package setup
        if: steps.prepared_check.outputs.has_prepared == 'true'
        shell: bash
        run: |
          python -m mip_channel_tools package-setup \
            --architecture "${{ inputs.architecture }}" 2>&1 | tee /tmp/package_setup.log

          # Surface vcpkg binary-cache traffic in the job summary. The previous
          # cache silently never hit for its entire life and nobody noticed;
          # "Restored 0 package(s)" on a package with native deps means the
          # cache is cold or broken and the build is paying full price.
          if grep -qE "Restored [0-9]+ package" /tmp/package_setup.log; then
            { echo "### vcpkg binary cache"
              grep -E "Restored [0-9]+ package|submission of .* binary cache" /tmp/package_setup.log | head -8
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up MATLAB
        if: steps.prepared_check.outputs.has_prepared == 'true'
        uses: matlab-actions/setup-matlab@v3
        with:
          cache: true
          # R2022a pins the libstdc++/libgfortran ABI axis (devnotes/MATLAB-GCC.md).
          # The glibc axis is the ubi8 container's job (devnotes/MATLAB-GLIBC.md),
          # NOT the
          # MATLAB version. Per-arch overrides, each the OLDEST release that
          # works (oldest MEX -> widest forward compatibility):
          #   - macos_arm64: R2023b, the oldest Apple-Silicon-native MATLAB
          #     (R2022a links arm64 MEX against x86_64 libmx, "symbol(s) not
          #     found for arm64").
          #   - windows_x86_64: R2023a, the oldest release that certifies the
          #     MinGW we install (8.1.0; see devnotes/MATLAB-MINGW.md). R2022a's
          #     mex config predates 8.1.0 and rejects modern GCC outright.
          #   - everything else: R2022a.
          release: ${{ inputs.architecture == 'macos_arm64' && 'R2023b' || inputs.architecture == 'windows_x86_64' && 'R2023a' || 'R2022a' }}
          # The matlab-deps:ubi8 image already carries MATLAB's system libs, and
          # it's RHEL — setup-matlab's apt-based dependency install can't run
          # there. Skip it inside the container; let it run normally elsewhere.
          install-system-dependencies: ${{ inputs.architecture != 'linux_x86_64' }}

      - name: Bundle package
        if: steps.prepared_check.outputs.has_prepared == 'true'
        uses: matlab-actions/run-command@v3
        env:
          BUILD_ARCHITECTURE: ${{ inputs.architecture }}
        with:
          command: "addpath('mip'); addpath('mip_channel_tools/scripts'); bundle_one"

      - name: Bundle check
        id: bundle_check
        shell: bash
        run: |
          if ls build/bundled/*.mhl >/dev/null 2>&1; then
            mhl=$(ls build/bundled/*.mhl | head -n1)
            echo "has_bundle=true" >> "$GITHUB_OUTPUT"
            echo "mhl_name=$(basename "$mhl")" >> "$GITHUB_OUTPUT"
          else
            echo "has_bundle=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate the glibc floor (Linux; fail if a shipped binary needs > 2.28)
        if: inputs.architecture == 'linux_x86_64' && steps.bundle_check.outputs.has_bundle == 'true'
        shell: bash
        run: |
          # devnotes/MATLAB-GLIBC.md: a MEX (or a bundled .so) built against newer
          # glibc won't load on the Rocky/RHEL 8 fleet (glibc 2.28). Inspect every ELF
          # inside the shipped .mhl (a zip) and fail if anything requires a symbol
          # newer than 2.28, so a base-image bump can't silently raise the floor.
          mhl=$(ls build/bundled/*.mhl | head -n1)
          echo "Gating $mhl"
          tmp=$(mktemp -d)
          unzip -q "$mhl" -d "$tmp"
          fail=0
          found=0
          while IFS= read -r f; do
            found=1
            # `|| true`: a binary with no versioned GLIBC reference at all (e.g.
            # a small pure-C MEX whose only libc calls the compiler inlines
            # away) makes grep exit 1, and under the runner's `bash -e -o
            # pipefail` a bare var=$(pipeline) assignment then kills the step
            # silently, before any output. Such binaries cannot violate the
            # floor; report them as OK instead.
            max=$(objdump -T "$f" 2>/dev/null | grep -oE 'GLIBC_[0-9.]+' \
                  | sed 's/GLIBC_//' | sort -V | tail -1 || true)
            if [ -z "$max" ]; then
              echo "  OK   $(basename "$f"): no versioned GLIBC references"
              continue
            fi
            highest=$(printf '%s\n2.28\n' "$max" | sort -V | tail -1)
            if [ "$highest" = "2.28" ]; then
              echo "  OK   $(basename "$f"): max GLIBC_$max"
            else
              echo "::error::$(basename "$f") requires GLIBC_$max (> 2.28)"
              fail=1
            fi
          done < <(find "$tmp" \( -name '*.mexa64' -o -name '*.so' -o -name '*.so.*' \) -type f)
          if [ "$found" -eq 0 ]; then
            echo "::error::No ELF binaries (.mexa64/.so) found in $mhl to gate"
            exit 1
          fi
          [ "$fail" -eq 0 ] || { echo "glibc gate FAILED"; exit 1; }
          echo "glibc gate passed: every shipped binary loads on glibc 2.28"

      - name: Upload bundled artifact
        if: steps.bundle_check.outputs.has_bundle == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: bundled-${{ inputs.architecture }}
          path: build/bundled/
          if-no-files-found: error

  test-and-upload:
    name: test+upload (${{ inputs.architecture }})
    needs: [setup, build]
    if: needs.build.outputs.has_bundle == 'true'
    runs-on: ${{ needs.setup.outputs.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Checkout mip
        uses: actions/checkout@v5
        with:
          repository: mip-org/mip
          path: mip

      - name: Set up MIP_ROOT
        shell: bash
        run: |
          root="$HOME/.mip"
          mkdir -p "$root/packages"
          # MATLAB is a native Windows program; hand it a Windows path, not
          # the MSYS/Git-bash '/c/...' form. cygpath is a no-op on linux/macOS.
          if command -v cygpath >/dev/null 2>&1; then root="$(cygpath -w "$root")"; fi
          echo "MIP_ROOT=$root" >> "$GITHUB_ENV"

      - name: Download bundled artifact
        uses: actions/download-artifact@v8
        with:
          name: bundled-${{ inputs.architecture }}
          path: build/bundled

      - name: Set up MATLAB
        # numbl_wasm ships a .wasm + .numbl.js (no MEX); it is exercised by the
        # numbl runtime, not MATLAB. Skip MATLAB setup/test for it and validate
        # the artifact below instead.
        if: inputs.architecture != 'numbl_wasm'
        uses: matlab-actions/setup-matlab@v3
        with:
          cache: true
          # Mirror the build job's per-arch release choice (R2022a / R2023a /
          # R2023b). This job runs on the bare runner (no container): it only
          # loads and tests the already-built .mhl, so glibc portability isn't a
          # concern here — the 2.28-floored MEX loads fine on the newer runner
          # (build-low/run-high).
          release: ${{ inputs.architecture == 'macos_arm64' && 'R2023b' || inputs.architecture == 'windows_x86_64' && 'R2023a' || 'R2022a' }}

      - name: Strip build environment (Linux)
        if: inputs.architecture == 'linux_x86_64' || inputs.architecture == 'any'
        shell: bash
        run: |
          # Bypass apt's resolver: enumerate installed toolchain packages
          # and let dpkg purge them with --force-depends. The resolver
          # rejects our purge sets because some toolchain packages have
          # reverse-dep chains into essentials (libgcc-s1, libssl3t64,
          # etc.). --force-depends ignores those checks and removes the
          # named packages anyway; the resulting dpkg state is inconsistent
          # but the runner is thrown away after this job.
          #
          # Patterns are anchored with ^...$ so partial matches don't slip
          # in. They intentionally exclude libstdc++6, libgcc-s1, libc6
          # (essential runtimes that MATLAB and the runner itself need).
          PURGE_RE='^(gcc.*|g\+\+.*|gfortran.*|clang.*|libclang.*|llvm.*|libllvm.*|lld.*|libomp.*|libgfortran.*|libgomp.*|libquadmath.*|libatomic.*|libitm.*|libasan.*|libubsan.*|liblsan.*|libtsan.*|libcc1.*|libssp.*|libstdc\+\+-.*-dev|libgcc-.*-dev|make|ninja-build|patchelf|build-essential|binutils.*|libbinutils.*|libctf.*|libgprofng.*|autoconf|automake|libtool|pkg-config|pkgconf.*|bison|flex|m4|cmake.*)$'

          PKGS=$(dpkg-query -W --showformat='${Package}\n' 2>/dev/null | grep -E "$PURGE_RE" || true)

          if [ -n "$PKGS" ]; then
            echo "Purging $(echo "$PKGS" | wc -l) packages via dpkg --force-depends:"
            echo "$PKGS" | sed 's/^/  /'
            sudo dpkg --purge --force-depends $PKGS || true
          fi

          # Non-apt installs added by the runner-image setup (newer than apt):
          sudo rm -rf /usr/local/bin/cmake /usr/local/bin/ctest /usr/local/bin/cpack \
                      /usr/local/share/cmake-* /usr/local/doc/cmake* \
                      /usr/local/man/man1/cmake.1.gz /usr/local/man/man1/ctest.1.gz \
                      /usr/local/man/man1/cpack.1.gz /usr/local/man/man7/cmake-* \
                      /usr/local/bin/ninja

          # Linuxbrew tree (preinstalled but not on PATH; wipe anyway)
          sudo rm -rf /home/linuxbrew

          # Refresh the linker cache so removed .so files don't linger
          sudo ldconfig

      - name: Verify strip (Linux)
        if: inputs.architecture == 'linux_x86_64' || inputs.architecture == 'any'
        shell: bash
        run: |
          leaked=0
          for c in gcc g++ gfortran cc c++ clang ld as cmake patchelf; do
            if command -v "$c" >/dev/null 2>&1; then
              echo "::error::Leaked binary: $c at $(command -v "$c")"
              leaked=1
            fi
          done
          for lib in libgfortran libgomp libquadmath; do
            if /sbin/ldconfig -p 2>/dev/null | grep -q "$lib"; then
              hits=$(/sbin/ldconfig -p 2>/dev/null | grep "$lib" | tr -s ' ' || true)
              echo "::error::Leaked runtime lib $lib:"
              echo "$hits"
              leaked=1
            fi
          done
          if [ "$leaked" -ne 0 ]; then
            echo "Strip did not remove expected toolchain; aborting before test." >&2
            exit 1
          fi
          echo "Strip OK: no compiler binaries or runtime libs on the linker path."

      - name: Strip build environment (macOS)
        if: inputs.architecture == 'macos_arm64'
        shell: bash
        run: |
          # Rename rather than rm -rf: an APFS rename is a metadata-only
          # op (~ms), while rm -rf walks 100k+ files in Xcode/Homebrew
          # and takes ~3 min. The runner is ephemeral so leaving the
          # bytes on disk is fine; the test only needs the paths to be
          # unfindable by the linker / loader.
          for d in /Applications/Xcode*.app; do
            [ -e "$d" ] || continue
            sudo mv "$d" "${d}.deleted"
          done
          if [ -e /Library/Developer ]; then
            sudo mv /Library/Developer /Library/Developer.deleted
          fi
          if [ -e ~/Library/Developer ]; then
            sudo mv ~/Library/Developer ~/Library/Developer.deleted
          fi
          sudo pkgutil --forget com.apple.pkg.CLTools_Executables 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.CLTools_SDK_macOS 2>/dev/null || true
          sudo pkgutil --forget com.apple.pkg.DeveloperToolsCLI 2>/dev/null || true
          sudo xcode-select --reset 2>/dev/null || true
          if [ -e /opt/homebrew ]; then
            sudo mv /opt/homebrew /opt/homebrew.deleted
          fi

      - name: Strip build environment (Windows)
        if: inputs.architecture == 'windows_x86_64'
        shell: pwsh
        run: |
          # Rename rather than uninstall/rm: an NTFS directory rename within
          # the same volume is a metadata-only op (~ms), while the VS
          # `vs_installer uninstall --wait` and `Remove-Item -Recurse` over
          # the million-file msys64/Strawberry/VS trees together take ~4 min.
          # The runner is ephemeral, so leaving the bytes on disk is fine; the
          # test only needs the toolchain paths to be unfindable by the linker
          # / loader. Renaming also sidesteps per-file locked-file failures
          # that stall Remove-Item: NTFS renames a directory without touching
          # its descendants. (Mirrors the macOS strip step.)
          #
          # No `vs_installer uninstall` and no per-package `choco uninstall`:
          # renaming the VS / chocolatey trees makes cl.exe/link.exe and the
          # MinGW runtime DLLs unfindable, which is all self-containment needs.
          # Errors are swallowed here (e.g. a VS background service could pin a
          # handle and block the VS rename); the "Verify strip" step below is
          # the hard gate — a silently-failed rename fails the job there rather
          # than letting a non-self-contained package pass.
          $paths = @(
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Microsoft Visual Studio",
            "C:\Program Files (x86)\Windows Kits",
            "C:\Program Files\LLVM",
            "C:\Strawberry",
            "C:\msys64",
            "C:\mingw64",
            "C:\ProgramData\chocolatey",
            "C:\Program Files\CMake"
          )
          # NB: do NOT strip "C:\Program Files\Git\mingw64". Git for Windows'
          # bin\bash.exe and bin\git.exe are thin wrappers that exec the real
          # binaries under that tree; renaming it breaks the `shell: bash`
          # steps that follow (they die with "Top-level not found" / "BUG
          # (fork bomb)"). It holds no build toolchain anyway — the MinGW
          # compiler lives at C:\mingw810\mingw64 and the MEX links -static,
          # so there is no MinGW runtime DLL dependency to guard against.
          # Fast path: [IO.Directory]::Move (Win32 MoveFile) is a metadata-only
          # same-volume rename (~ms). It fails (ACCESS_DENIED) while ANY process
          # holds a handle anywhere under the tree — on a fresh runner that pin
          # is transient (a Defender scan, ngen, a VS background service), so
          # retry against a shared 60s budget instead of bailing to the fallback
          # on the first throw. Only a path still blocked after the budget falls
          # back to Move-Item, which degrades to a recursive copy+delete on a
          # pinned tree (~5 min on the VS dir) — kept as the last resort to
          # preserve prior behavior. Move-Item swallows its own errors; "Verify
          # strip" below is the hard gate either way.
          $deadline = [DateTime]::UtcNow.AddSeconds(60)
          foreach ($p in $paths) {
            if (-not (Test-Path $p)) { continue }
            $sw = [Diagnostics.Stopwatch]::StartNew()
            $err = $null
            while ($true) {
              try { [System.IO.Directory]::Move($p, "$p.deleted"); break }
              catch {
                $err = $_
                if ([DateTime]::UtcNow -ge $deadline) { break }
                Start-Sleep -Seconds 2
                $err = $null
              }
            }
            if ($null -eq $err) {
              Write-Host ("  renamed ({0:n1}s): {1}" -f $sw.Elapsed.TotalSeconds, $p)
            } else {
              Write-Host ("  rename still blocked after {0:n1}s ({1}); Move-Item fallback: {2}" -f `
                $sw.Elapsed.TotalSeconds, $err.Exception.Message, $p)
              Move-Item -Force -ErrorAction SilentlyContinue $p "$p.deleted"
            }
          }

      - name: Verify strip (Windows)
        if: inputs.architecture == 'windows_x86_64'
        shell: pwsh
        run: |
          # Hard gate on the rename-based strip above. If a rename silently
          # failed (e.g. a locked VS service handle), a compiler/linker would
          # still be findable under one of the stripped roots and the
          # self-containment test would falsely pass. Fail loudly here.
          # (Mirrors the Linux "Verify strip" step; macOS lacks one because
          # its renames are not handle-blocked.)
          #
          # Filter found binaries by resolved path under a stripped root, not
          # by bare name: names like `link` collide with benign tools (Git for
          # Windows ships GNU coreutils `link.exe` in C:\Program Files\Git\
          # usr\bin, unrelated to the MSVC linker). Only a sentinel resolving
          # *inside* a dir we renamed means the strip actually failed.
          $strippedRoots = @(
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Microsoft Visual Studio",
            "C:\Program Files (x86)\Windows Kits",
            "C:\Program Files\LLVM",
            "C:\Strawberry",
            "C:\msys64",
            "C:\mingw64",
            "C:\Program Files\CMake"
          )
          $leaked = @()
          foreach ($exe in 'cl','link','gcc','g++','gfortran','clang','ld') {
            foreach ($c in (Get-Command $exe -All -ErrorAction SilentlyContinue)) {
              $src = $c.Source
              if (-not $src) { continue }
              foreach ($root in $strippedRoots) {
                # Trailing separator so "C:\msys64.deleted\..." (the renamed
                # tree) doesn't match the "C:\msys64" root.
                if ($src.StartsWith($root + "\", [System.StringComparison]::OrdinalIgnoreCase)) {
                  $leaked += "$exe -> $src"
                }
              }
            }
          }
          if ($leaked.Count -gt 0) {
            Write-Output "::error::Strip left toolchain binaries findable:"
            $leaked | ForEach-Object { Write-Output "  $_" }
            Write-Output "Strip did not remove expected toolchain; aborting before test."
            exit 1
          }
          Write-Output "Strip OK: no compiler/linker binaries under stripped roots."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # This reusable workflow lives in mip_channel_tools; check out its own
      # repo (at the same ref it was called at) to get the build scripts,
      # mexopts, and vcpkg triplets alongside the Python package, then install
      # the package. The channel checkout (packages/, site/) is the default
      # `actions/checkout` above; this is a second checkout into a subdir. This
      # MUST happen before "Test bundled package": that step runs
      # `addpath('mip_channel_tools/scripts'); test_one`, so the scripts have to
      # be on disk first.
      - name: Checkout channel tooling
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: mip_channel_tools
      - name: Install channel tooling
        shell: bash
        # `python -m pip`, not bare `pip`: setup-python's pip wrapper bakes the
        # host tool-cache path into its shebang, so bare `pip` fails with "bad
        # interpreter" in the ubi8 build container (where `python` is the
        # toolchain python3.9).
        run: |
          echo "MIP_TOOLS_DIR=$GITHUB_WORKSPACE/mip_channel_tools" >> "$GITHUB_ENV"
          python -m pip install "$GITHUB_WORKSPACE/mip_channel_tools"

      - name: Test bundled package
        # On non-macOS native arches, run normally — any matlab error fails the
        # job. numbl_wasm is validated by the artifact smoke test below, not here.
        if: inputs.architecture != 'macos_arm64' && inputs.architecture != 'numbl_wasm'
        uses: matlab-actions/run-command@v3
        with:
          command: "addpath('mip'); addpath('mip_channel_tools/scripts'); test_one"

      - name: Set up Node (numbl_wasm)
        if: inputs.architecture == 'numbl_wasm'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test bundled package (numbl_wasm via numbl)
        # numbl_wasm ships a .wasm + .numbl.js exercised by the numbl runtime,
        # not MATLAB. Run the package's test_script exactly as a user would:
        # install the freshly built .mhl, load it, and `mip test`. A failed
        # assertion (or a missing/invalid .wasm) makes `numbl eval` exit nonzero
        # and fails the job *before* the upload step below, so a broken bundle
        # is never published. The dependency channel is derived from the repo
        # (owner/mip-<chan> -> owner/<chan>), mirroring scripts/test_one.m.
        #
        # numbl runtime: built from the flatironinstitute/numbl `main` tip while
        # the numbl features this needs are still stabilizing (local-.mhl
        # install -> copyfile/fileattrib; maxNumCompThreads). Once a published
        # npm release ships them, drop the build-from-source block and use the
        # commented `npm install -g numbl` line instead.
        if: inputs.architecture == 'numbl_wasm'
        shell: bash
        env:
          MIP_CONFIRM: 'y'
        run: |
          set -euo pipefail

          # --- numbl runtime ---------------------------------------------------
          # Future (once numbl on npm has the required builtins):
          #   npm install -g numbl
          #   numbl=numbl
          # For now, build the dev version from source (main tip):
          git clone --depth 1 https://github.com/flatironinstitute/numbl /tmp/numbl-dev
          ( cd /tmp/numbl-dev && npm ci && npm run build:cli )
          numbl="node /tmp/numbl-dev/dist-cli/cli.js"
          echo "numbl $($numbl --version)"

          # --- install / load / test the freshly built .mhl -------------------
          mhl=$(realpath "$(ls build/bundled/*.mhl | head -n1)")
          name=$(node -e "const fs=require('fs');console.log(JSON.parse(fs.readFileSync(process.argv[1]+'.mip.json','utf8')).name)" "$mhl")
          install="mip('install','$mhl')"
          if [ -n "${GITHUB_REPOSITORY:-}" ]; then
            owner="${GITHUB_REPOSITORY%%/*}"
            chan="${GITHUB_REPOSITORY##*/}"; chan="${chan#mip-}"
            install="mip('install','--channel','${owner}/${chan}','$mhl')"
          fi
          echo "Testing '$name' from $(basename "$mhl") via numbl"
          $numbl eval "${install}; mip('load','$name'); mip('test','$name')"

      - name: Test bundled package (macOS, SIGSEGV-tolerant)
        # MATLAB R2024b+ on macOS arm64 SIGSEGVs in _pthread_tsd_cleanup at
        # shutdown for any MEX linking Homebrew libgomp/libgfortran (see
        # https://github.com/wmutschl/matlab_openmp_tls_bug). The crash is
        # cosmetic — tests complete before MATLAB exits. We write a marker
        # file on full success and verify it in the next step so a real
        # test/load failure still fails the job, but exit-time SIGSEGV is
        # tolerated. continue-on-error lets the job survive the nonzero
        # matlab return code; the next step is the real gate.
        if: inputs.architecture == 'macos_arm64'
        continue-on-error: true
        uses: matlab-actions/run-command@v3
        with:
          command: "addpath('mip'); addpath('mip_channel_tools/scripts'); try; test_one; fid = fopen('.tests_passed', 'w'); fclose(fid); catch err; disp(getReport(err)); exit(1); end"

      - name: Verify tests passed (macOS)
        if: inputs.architecture == 'macos_arm64'
        shell: bash
        run: |
          if [ -f .tests_passed ]; then
            echo "::notice::tests passed (matlab exit-time SIGSEGV tolerated)"
          else
            echo "::error::tests failed (no .tests_passed marker)"
            exit 1
          fi

      - name: Restore Homebrew for upload (macOS)
        # The macOS strip step renamed /opt/homebrew (which holds `gh`) to
        # exercise the package in a brew-free env. The test is done, so put it
        # back — otherwise the upload step below can't find `gh`. APFS rename
        # is metadata-only (~ms).
        if: inputs.architecture == 'macos_arm64'
        shell: bash
        run: |
          if [ -e /opt/homebrew.deleted ]; then
            sudo mv /opt/homebrew.deleted /opt/homebrew
          fi

      - name: Publish .mhl to GitHub Release
        # publish=true: upload to the package's real release (the assemble +
        #   deploy job below then rebuilds the channel index from it).
        # publish=false (submission test build): upload to the rolling
        #   `_test-builds` prerelease instead, giving the .mhl a direct download
        #   URL for local testing. The index job is skipped, and `_test-builds`
        #   is never indexed (assemble-index only indexes tags backed by a
        #   packages/ folder in this channel).
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ inputs.publish }}" = "true" ]; then
            python -m mip_channel_tools upload
          else
            python -m mip_channel_tools upload --release-tag _test-builds --prerelease
          fi

  assemble-and-deploy:
    name: assemble + deploy
    needs: [build, test-and-upload]
    # Skipped for submission test builds (publish=false): the .mhl went to the
    # `_test-builds` prerelease, not the channel, so the index/Pages must not be
    # rebuilt.
    if: always() && inputs.publish && needs.build.result == 'success' && (needs.test-and-upload.result == 'success' || needs.test-and-upload.result == 'skipped')
    runs-on: ubuntu-latest
    # Serialize Pages deploys across concurrent package builds.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # This reusable workflow lives in mip_channel_tools; check out its own
      # repo (at the same ref it was called at) to get the build scripts,
      # mexopts, and vcpkg triplets alongside the Python package, then install
      # the package. The channel checkout (packages/, site/) is the default
      # `actions/checkout` above; this is a second checkout into a subdir.
      - name: Checkout channel tooling
        uses: actions/checkout@v5
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: mip_channel_tools
      - name: Install channel tooling
        shell: bash
        # `python -m pip`, not bare `pip`: setup-python's pip wrapper bakes the
        # host tool-cache path into its shebang, so bare `pip` fails with "bad
        # interpreter" in the ubi8 build container (where `python` is the
        # toolchain python3.9).
        run: |
          echo "MIP_TOOLS_DIR=$GITHUB_WORKSPACE/mip_channel_tools" >> "$GITHUB_ENV"
          python -m pip install "$GITHUB_WORKSPACE/mip_channel_tools"

      - name: Assemble package index
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -m mip_channel_tools assemble-index --site-dir mip_channel_tools/site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
